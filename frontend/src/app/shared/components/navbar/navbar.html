<header
  class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0"
>
  <!-- Page title slot -->
  <div class="flex items-center gap-2">
    <h1 class="text-lg font-semibold text-gray-800">Product Manager</h1>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-4">
    <!-- User badge -->
    <div class="flex items-center gap-2">
      <div
        class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold"
      >
        {{ auth.currentUser()?.firstName?.charAt(0)?.toUpperCase() }}
      </div>
      <div class="hidden sm:block">
        <p class="text-sm font-medium text-gray-800">
          {{ auth.currentUser()?.firstName }} {{ auth.currentUser()?.lastName }}
        </p>
        <p class="text-xs text-gray-500">{{ auth.currentUser()?.roles?.[0] }}</p>
      </div>
    </div>
  </div>
</header>
